workflows:
  ios-capacitor:
    name: My Day Point iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ismoztas.dayscore
      vars:
        BUNDLE_ID: "com.ismoztas.dayscore"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    cache:
      cache_paths:
        - ~/.npm
        - ios/Pods
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build web bundle
        script: npm run build
      - name: Create iOS project if needed
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
      - name: Sync Capacitor iOS
        script: npx cap sync ios
      - name: Generate iOS app icon and splash
        script: npm run assets:ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Apply Codemagic signing profiles
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      email:
        recipients:
          - is.oztas@hotmail.com
        notify:
          success: true
          failure: true
